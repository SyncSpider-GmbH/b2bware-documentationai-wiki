openapi: 3.0.0
info:
  title: EventHub API
  description: >-
    Complete API collection for EventHub — outgoing webhooks driven by hub
    events.
  version: 1.0.0
servers:
  - url: https://api.datahub.syncspider.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
tags:
  - name: Event Subscriptions
  - name: Activities & Deliveries
  - name: Statistics
  - name: Dropdown Options
  - name: Hub Settings
paths:
  /api/v1/apps/event-hub/event-subscriptions:
    get:
      tags:
        - Event Subscriptions
      summary: List subscriptions
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installation_key}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          example: '25'
        - name: filter[event_slug]
          in: query
          schema:
            type: string
          example: orderhub.order.created
        - name: filter[status]
          in: query
          schema:
            type: string
          example: active
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Event Subscriptions
      summary: Create subscription
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Order created -> partner ERP
                description: Forwards every order.created event to the partner ERP webhook.
                event_slug: orderhub.order.created
                target_url: https://partner.example.com/webhooks/orders
                http_method: POST
                headers:
                  X-Partner-Token: abc123
                payload_includes:
                  - customer
                  - orderLineItems
                  - orderLineItems.product
                conditions:
                  type: combine
                  operator: all
                  conditions:
                    - type: field
                      path: total_price
                      operator: '>='
                      value: 100
                    - type: array_any
                      path: orderLineItems
                      conditions:
                        type: combine
                        operator: all
                        conditions:
                          - type: field
                            path: product_id
                            operator: '=='
                            value: 2
                          - type: field
                            path: qty
                            operator: '>'
                            value: 5
                status: active
                timeout_seconds: 15
                max_tries: 3
                retry_backoff_type: exponential
                initial_backoff_seconds: 10
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installation_key}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/event-hub/event-subscriptions/1:

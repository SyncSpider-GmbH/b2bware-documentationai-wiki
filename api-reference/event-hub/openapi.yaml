  /api/v1/apps/event-hub/event-subscriptions/events/orderhub.order.created/schema:
    get:
      tags:
        - Event Subscriptions
      summary: Event schema (drilled)
      description: >-
        Walks the dotted path on the event's root model graph and returns the
        terminal node's fields/relations along with the cardinality chain. Used
        to render scoped builders inside array_any/array_all/array_none nodes.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installation_key}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: path
          in: query
          schema:
            type: string
          example: orderLineItems.product
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/event-hub/event-subscriptions/events/orderhub.order.created/available-includes:
    get:
      tags:
        - Event Subscriptions
      summary: Event available payload includes
      description: >-
        Customer-facing whitelist of dotted include paths for the event's root
        model (sourced from the repository's $includes property, depth-capped to
        3). Drives the payload_includes multi-select.
      parameters:
        - name: installation-key
          in: header

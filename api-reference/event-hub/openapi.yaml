        - Event Subscriptions
      summary: Send test webhook
      description: >-
        Fetches the latest record of the event's root model, loads the
        subscription's payload_includes, and dispatches a real webhook with
        is_test=true. Returns 422 with a 'create at least one record' message
        when the model has no rows.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example: {}
      parameters:

      tags:
        - Customer Payment Methods
      summary: Sync Payment Methods
      description: Re-pulls the customer's stored instruments from the configured PSP.
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n  \"billing_method_id\": 1\n}"'

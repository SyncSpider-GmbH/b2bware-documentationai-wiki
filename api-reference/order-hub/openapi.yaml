          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: include
          in: query
          schema:
            type: string
          example: orderLineItems,customer
        - name: per_page
          in: query
          schema:
            type: integer
          example: '10'
        - name: sort
          in: query
          schema:
            type: string
          example: '-_created_at'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/orders/{order}:
    get:
      tags:

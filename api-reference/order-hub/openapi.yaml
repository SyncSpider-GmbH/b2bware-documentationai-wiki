      summary: Update Cart Item
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n  \"quantity\": 3\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cartItem
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Cart Items
      summary: Remove Cart Item
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cartItem
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/carts/{cart}/checkout:
    get:
      tags:
        - Checkout
      summary: Get Checkout Summary
      description: >-
        Returns the priced, tax-calculated, shipping-resolved view of the cart,
        ready for confirmation.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Checkout
      summary: Place Order
      description: >-
        Creates the order from the cart. If the chosen billing method requires
        PSP redirection, the response contains a `redirect_url` for the
        customer's browser.
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"billing_method_id\": 1,\n  \"shipping_method_id\": 2,\n 
                \"billing_address_id\": 5,\n  \"shipping_address_id\": 5,\n 
                \"customer_payment_method_id\": null,\n  \"notes\": \"\"\n}"
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

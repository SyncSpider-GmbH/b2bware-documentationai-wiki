          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: filter[cart_id]
          in: query
          schema:
            type: integer
          example: '1'
        - name: include
          in: query
          schema:
            type: string
          example: product.price,product.mainMedia
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Cart Items
      summary: Add Cart Item
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"cart_id\": 1,\n  \"product_id\": 100,\n  \"quantity\":
                2\n}"
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:

openapi: 3.0.0
info:
  title: OrderHub API
  description: Cart, checkout, orders, quotes.
  version: 1.0.0
  contact:
    name: B2Bware
    url: https://syncspider.com
servers:
  - url: https://api.datahub.syncspider.com
    description: Production
tags:
  - name: Public (URL-based installation key)
    description: >-
      Payment provider callbacks. Called by the PSP or by the customer's browser
      via redirect. No headers required.
  - name: Carts
    description: >-
      Cart lifecycle. Guest carts are identified by `session-uuid`; logged-in
      carts are scoped to the customer.
  - name: Cart Items
    description: Line item CRUD against an existing cart.
  - name: Checkout
    description: Convert an active cart into an order.
  - name: Orders
    description: Read-only order access for the logged-in customer.
  - name: Billing & Shipping Methods
    description: Read-only — storefront fetches the list to render checkout method pickers.
  - name: Customer Payment Methods
    description: >-
      Stored payment instruments for the logged-in customer (e.g. tokenized
      cards from the PSP).
  - name: Quotes (B2B)
    description: >-
      Request-for-quote workflow. Customer creates a quote; sales agent prices
      it; customer accepts → converts to order.
paths:
  /api/v1/apps/order-hub/payment/webhook/{installationKey}/{provider}/{order_id}:
    post:
      tags:
        - Public (URL-based installation key)
      summary: Payment Webhook (PSP → DataHub)
      description: >-
        Generic payment webhook endpoint. Each PSP integration validates its own
        payload format.


        **No signature verification** is applied at the API layer today —
        PSP-specific verification (e.g. HMAC) is delegated to the integration
        handler. Treated as a known gap.
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: installationKey
          in: path
          schema:
            type: string
          required: true
        - name: provider
          in: path
          schema:
            type: string
          required: true
          example: stripe
        - name: order_id
          in: path
          schema:
            type: integer
          required: true
          example: '1234'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/order/payment/{installationKey}/{order_id}:
    get:
      tags:
        - Public (URL-based installation key)
      summary: Payment Redirect (browser → DataHub)
      description: >-
        Customer is redirected here by the PSP after completing payment. The
        handler finalizes the order based on PSP-side status and redirects the
        browser to the storefront success/cancel page.
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: installationKey
          in: path
          schema:
            type: string
          required: true
        - name: order_id
          in: path
          schema:
            type: integer
          required: true
          example: '1234'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/carts:
    get:
      tags:
        - Carts
      summary: List Carts
      description: >-
        Returns carts visible to the caller. For a logged-in customer, this is
        their carts (typically one active). For a guest with `session-uuid`, the
        matching guest cart.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: include
          in: query
          schema:
            type: string
          example: cartItems.product.price,cartItems.product.mainMedia
        - name: per_page
          in: query
          schema:
            type: integer
          example: '10'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Carts
      summary: Create Cart
      description: >-
        Explicitly create a cart. Most storefronts create lazily via `PATCH
        /carts` (upsert).
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"customer_id\": null,\n  \"session_uuid\":
                \"00000000-0000-0000-0000-000000000000\"\n}"
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
        - Carts
      summary: Upsert Cart (PATCH /carts)
      description: >-
        Idiomatic cart bootstrap: creates or returns the active cart for the
        caller (logged-in customer or guest `session-uuid`). Body is optional
        metadata.
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/carts/{cart}:
    get:
      tags:
        - Carts
      summary: Show Cart
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: include
          in: query
          schema:
            type: string
          example: cartItems.product.price,cartItems.product.mainMedia
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Carts
      summary: Update Cart
      description: 'Update cart metadata: chosen billing/shipping method, addresses, notes.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"billing_method_id\": 1,\n  \"shipping_method_id\": 2,\n 
                \"billing_address_id\": 5,\n  \"shipping_address_id\": 5\n}"
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Carts
      summary: Delete Cart
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/carts/{cart}/rule-progress:
    get:
      tags:
        - Carts
      summary: Cart Rule Progress
      description: >-
        Returns the progress against active cart rules (e.g. "spend €20 more for
        free shipping"). Useful for showing motivational messaging in the cart
        UI.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: '{{installationKey}}'
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: '{{authToken}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: cart
          in: path
          schema:
            type: integer
          required: true
          example: '1'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/cart-items:
    get:
      tags:

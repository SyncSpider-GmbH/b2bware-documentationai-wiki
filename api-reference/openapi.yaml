      summary: Payment Webhook (PSP → DataHub)
      description: >-
        Generic payment webhook endpoint. Each PSP integration validates its own
        payload format.


        **No signature verification** is applied at the API layer today —
        PSP-specific verification (e.g. HMAC) is delegated to the integration
        handler. Treated as a known gap.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: installationKey
          in: path
          schema:
            type: string
          required: true
        - name: provider
          in: path
          schema:
            type: string
          required: true
          example: stripe
        - name: order_id
          in: path
          schema:
            type: integer
          required: true
          example: "1234"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}

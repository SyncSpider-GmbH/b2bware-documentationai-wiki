            type: string
          required: true
          example: registration
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /cdn/{domain}/{path}:
    get:
      tags:
        - CDN
        - MediaHub
      summary: Fetch Media Asset
      description: >-
        Returns the raw media bytes. Resize/format variants (if enabled by the
        installation) are encoded into the `:path` segment.


        Cacheable on any standard CDN — responses include long `Cache-Control`
        headers and are identical regardless of caller.
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: domain
          in: path
          schema:
            type: string
          required: true
          description: Tenant media domain (FQDN). Validated against
            `[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}`.
          example: gogatec.com
        - name: path
          in: path
          schema:
            type: string
          required: true
          description: Object path inside the configured storage backend; may contain
            slashes.
          example: 01_files/Kataloge/GOGAEX.pdf
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/tax-hub/calculate:
    post:
      tags:
        - Calculation
        - TaxHub
      summary: Calculate Tax
      description: Returns per-line and total tax amounts using the matching tax rules
        for the given country, customer group, and tax class. The same
        calculation runs server-side during checkout — calling this directly is
        only needed for live preview in cart/PDP.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"country_code\": \"AT\",\n  \"customer_group_id\":
                null,\n  \"items\": [\n    {\n      \"product_id\":
                100,\n      \"quantity\": 2,\n      \"unit_price\":
                29.99,\n      \"tax_class_id\": 1\n    }\n  ]\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json

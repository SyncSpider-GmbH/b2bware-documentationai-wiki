components:
  schemas: {}
  securitySchemes:
    InstallationKey:
      type: apiKey
      in: header
      name: installation-key
      description: Tenant identifier. Safe to expose in the browser.
    CustomerAuthToken:
      type: apiKey
      in: header
      name: x-auth-token
      description: Issued by POST /api/v1/apps/auth-hub/login. Customer-scoped.
    ServerBearer:
      type: http
      scheme: bearer
      description: Server-only SpiderDesk API token. NEVER ship to a browser.
security:
  - InstallationKey: []

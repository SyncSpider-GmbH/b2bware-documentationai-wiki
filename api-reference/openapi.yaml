openapi: 3.0.0
info:
  title: B2Bware DataHub API (Storefront)
  version: 1.0.0
  description: >-
    Storefront-facing endpoints for the B2Bware DataHub API. See
    https://b2bware-documentationai-wiki/authentication for the authentication
    model.


    This spec aggregates the storefront-relevant endpoints of every hub.
    Admin-only endpoints are deliberately excluded.
  contact:
    name: B2Bware
    url: https://syncspider.com
servers:
  - url: https://api.datahub.syncspider.com
    description: Production
tags:
  - name: AuthHub
    description: Storefront customer authentication.
  - name: ProductHub
    description: Catalog, prices, stock, media.
  - name: OrderHub
    description: Cart, checkout, orders, quotes.
  - name: CustomerHub
    description: Customer profile, addresses, favorites, companies.
  - name: MediaHub
    description: Public CDN proxy.
  - name: TaxHub
    description: Tax calculation and read-only configuration.
  - name: ContentHub
    description: CMS pages, blocks, menus.
paths:
  /api/v1/apps/auth-hub/{installationKey}/reset-password:
    post:
      tags:
        - Public (URL-based installation key)
        - AuthHub
      summary: Reset Password
      description: >-
        Completes a password reset started by `POST /forgot-password`.


        - `code` — 6-char code from the reset email; expires after 1 hour.

        - `password` — new password; must satisfy installation password policy.

        - `password_confirmation` — must equal `password`.


        Returns 200 with `{ "message": "Password reset successfully." }` on
        success.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"code\": \"ABC123\",\n  \"password\":
                \"new-strong-password\",\n  \"password_confirmation\":
                \"new-strong-password\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: installationKey
          in: path
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/{installationKey}/verify-email:
    post:
      tags:
        - Public (URL-based installation key)
        - AuthHub
      summary: Verify Email
      description: >-
        Confirms a customer's email using the 6-char code sent by `POST
        /send-verification-email` or by `register`. Code expires after 24 hours.


        If the installation does not require admin approval, the customer is
        also activated.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"code\": \"ABC123\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: installationKey
          in: path
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/login:
    post:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Login
      description: >-
        Exchanges email + password for an `x-auth-token`.


        Response:

        ```json

        {
          "token": "42.JDJ5JDEyJGFiY2RlZmdo...",
          "customer": { "id": 42, "email": "jane.doe@example.com", ... }
        }

        ```


        Specific 401 messages distinguish failure modes:

        - `Email not found` — no customer with this email (also returned when
        only a guest-checkout record exists; route the user to registration, not
        password reset).

        - `Password not valid` — password mismatch.

        - `Account is inactive` — admin must approve.

        - `Email not verified` — customer must complete `verify-email` first.


        The test script auto-saves `token` into the `authToken` collection
        variable.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"email\": \"jane.doe@example.com\",\n  \"password\":
                \"correct-horse-battery-staple\"\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/register:
    post:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Register
      description: >-
        Creates a B2B customer account.


        - `company` is optional; include for B2B registrations.

        - If the installation requires email verification, the response still
        contains a `token` but the customer must verify before placing orders.

        - If the installation requires admin approval, the response **omits**
        `token` and the customer cannot log in until activated.

        - **Guest upgrade:** if a guest-checkout record already exists for
        `email` with no password, registration upgrades that record instead of
        creating a new one (preserving prior orders).


        Validation rules follow CommonFilterRepository conventions; unique check
        uses MongoDB collection `items_{customer_entity}` with `_deleted_at IS
        NULL`.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"first_name\": \"Jane\",\n  \"last_name\":
                \"Doe\",\n  \"email\":
                \"jane.doe@example.com\",\n  \"password\":
                \"correct-horse-battery-staple\",\n  \"password_confirmation\":
                \"correct-horse-battery-staple\",\n  \"phone\": \"+43 660
                1234567\",\n  \"language\": \"en\",\n  \"company\":
                {\n    \"name\": \"Acme GmbH\",\n    \"vat_id\":
                \"ATU12345678\",\n    \"street\": \"Hauptstrasse
                1\",\n    \"city\": \"Vienna\",\n    \"zip\":
                \"1010\",\n    \"country_code\": \"AT\"\n  }\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/forgot-password:
    post:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Forgot Password
      description: >-
        Sends a 6-character reset code to `email` (1 hour expiry). The customer
        then completes the reset via `POST /{installationKey}/reset-password`.


        Returns 200 with a generic message even if the email does not exist
        (prevents email enumeration).
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"email\": \"jane.doe@example.com\"\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/send-verification-email:
    post:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Send Verification Email
      description: (Re)sends a 6-character email-verification code (24 hour expiry).
        Used when the customer did not receive or has lost the original code
        from registration.
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"email\": \"jane.doe@example.com\"\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/me:
    get:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Get Me
      description: >-
        Returns the currently authenticated customer.


        Unlike other endpoints, a missing/invalid `x-auth-token` returns a
        specific 401 body:

        ```json

        {
          "error": "unauthorized",
          "messages": ["No x-auth-token header was provided."],
          "code": 401
        }

        ```

        Use this to distinguish 'token missing' from 'token expired'.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/logout:
    post:
      tags:
        - Customer auth (installation-key)
        - AuthHub
      summary: Logout
      description: >-
        Revokes the current `x-auth-token`. Subsequent requests with that token
        return 401.


        Logout-all (revoke every session for the customer) is **not yet
        implemented** — tracked as a gap.
      requestBody:
        content: {}
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/impersonate/customers:
    get:
      tags:
        - Impersonation (sales agent)
        - AuthHub
      summary: List Impersonatable Customers
      description: >-
        Paginated list of customers the agent is allowed to impersonate.
        Supports `filter[search]` against name/email/company.


        Agents cannot impersonate other agents or admins.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: per_page
          in: query
          schema:
            type: integer
          example: "20"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/impersonate/{customerId}:
    post:
      tags:
        - Impersonation (sales agent)
        - AuthHub
      summary: Impersonate Customer
      description: Issues an impersonation token. The response includes a new `token`
        that represents the target customer; the agent should use it in place of
        their own `x-auth-token` for subsequent storefront requests, then call
        `impersonate/leave` to return to their own session.
      requestBody:
        content: {}
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: customerId
          in: path
          schema:
            type: integer
          required: true
          description: ID of the customer to impersonate.
          example: "42"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/auth-hub/impersonate/leave:
    post:
      tags:
        - Impersonation (sales agent)
        - AuthHub
      summary: Leave Impersonation
      description: Ends the current impersonation session and restores the agent's
        original token.
      requestBody:
        content: {}
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products:
    get:
      tags:
        - Products
        - ProductHub
      summary: List Products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          description: Page number
          example: "1"
        - name: per_page
          in: query
          schema:
            type: integer
          description: Results per page (max 50)
          example: "20"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Products
        - ProductHub
      summary: Create Product
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"name\": \"Sample Product\",\n  \"sku\":
                \"SKU-12345\",\n  \"product_type\":
                \"simple\",\n  \"description\": \"Product
                description\",\n  \"short_description\": \"Short
                description\",\n  \"status\": \"active\",\n  \"visibility\":
                \"visible\",\n  \"manage_stock\": true,\n  \"tax_class_id\":
                1,\n  \"attributes\": [\n    {\n      \"attribute_id\":
                1,\n      \"value\": \"Red\",\n      \"auto_create_value\":
                false\n    }\n  ],\n  \"prices\":
                [\n    {\n      \"price_type\": \"regular\",\n      \"price\":
                99.99\n    }\n  ],\n  \"stock\":
                [\n    {\n      \"warehouse_id\": 1,\n      \"stock_quantity\":
                100,\n      \"stock_availability\": true,\n      \"backorders\":
                \"no_backorders\"\n    }\n  ],\n  \"media\":
                [\n    {\n      \"file\":
                \"base64_encoded_file_or_url\",\n      \"media_type\":
                \"image\",\n      \"alt_text\": \"Product
                image\",\n      \"is_primary\": true,\n      \"order\":
                1\n    }\n  ]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/1:
    get:
      tags:
        - Products
        - ProductHub
      summary: Get Product
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Products
        - ProductHub
      summary: Update Product
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"name\": \"Updated Product Name\",\n  \"description\":
                \"Updated description\",\n  \"status\":
                \"active\",\n  \"prices\": [\n    {\n      \"price_type\":
                \"regular\",\n      \"price\": 149.99\n    }\n  ]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Products
        - ProductHub
      summary: Delete Product
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/upsert/single:
    put:
      tags:
        - Products
        - ProductHub
      summary: Upsert Product
      description: "Create or update product by SKU. action can be: createOrUpdate,
        onlyCreate, onlyUpdate"
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"sku\": \"SKU-12345\",\n  \"name\": \"Product
                Name\",\n  \"product_type\": \"simple\",\n  \"description\":
                \"Product description\",\n  \"short_description\": \"Short
                description\",\n  \"status\": \"active\",\n  \"visibility\":
                \"visible\",\n  \"manage_stock\": true,\n  \"action\":
                \"createOrUpdate\",\n  \"attributes\":
                [\n    {\n      \"attribute_id\": 1,\n      \"value\":
                \"Blue\"\n    }\n  ],\n  \"prices\":
                [\n    {\n      \"price_type\": \"regular\",\n      \"price\":
                199.99\n    }\n  ],\n  \"stock\":
                [\n    {\n      \"warehouse_id\": 1,\n      \"stock_quantity\":
                50,\n      \"stock_availability\": true\n    }\n  ]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/bulk/update:
    put:
      tags:
        - Products
        - ProductHub
      summary: Bulk Update Products
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"[\n  {\n    \"id\": 1,\n    \"name\": \"Updated Product
                1\",\n    \"status\": \"active\"\n  },\n  {\n    \"id\":
                2,\n    \"name\": \"Updated Product 2\",\n    \"status\":
                \"inactive\"\n  }\n]"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/bulk/delete:
    delete:
      tags:
        - Products
        - ProductHub
      summary: Bulk Delete Products
      description: "Delete multiple products by IDs or use delete_all: true to delete
        all products"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/1/createVariations:
    put:
      tags:
        - Products
        - ProductHub
      summary: Create Variations
      description: Create product variations based on attribute combinations
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"attributes\": [\n    {\n      \"attribute_id\":
                1,\n      \"value\": [\"Red\", \"Blue\",
                \"Green\"]\n    },\n    {\n      \"attribute_id\":
                2,\n      \"value\": [\"S\", \"M\", \"L\"]\n    }\n  ]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/1/attachVariationsAttributes:
    put:
      tags:
        - Products
        - ProductHub
      summary: Attach Variations Attributes
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"attribute_ids\": [1, 2, 3]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/1/child-products:
    delete:
      tags:
        - Products
        - ProductHub
      summary: Detach Child Products
      description: Unlink child products from parent product
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /products/1/generateAIDescription:
    put:
      tags:
        - Products
        - ProductHub
      summary: Generate AI Description
      description: Generate product description using AI from PDF attributes
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"language\": \"en_001\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /categories:
    get:
      tags:
        - Categories
        - ProductHub
      summary: List Categories
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: "1"
        - name: per_page
          in: query
          schema:
            type: integer
          description: Max 200
          example: "50"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Categories
        - ProductHub
      summary: Create Category
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"name\": \"Electronics\",\n  \"slug\":
                \"electronics\",\n  \"description\": \"Electronic products
                category\",\n  \"parent_id\":
                null,\n  \"exclude_from_main_menu\":
                false,\n  \"exclude_from_layer_navigation\":
                false,\n  \"media\": [\n    {\n      \"file\":
                \"base64_or_url\",\n      \"media_type\":
                \"image\",\n      \"alt_text\": \"Category
                image\",\n      \"is_primary\": true,\n      \"order\":
                1\n    }\n  ],\n  \"attributes\":
                [\n    {\n      \"attribute_id\": 1,\n      \"value\":
                \"Category Value\",\n      \"auto_create_value\":
                false\n    }\n  ],\n  \"meta_data\": {\n    \"definition\":
                [\n      {\n        \"name\": \"Meta Field\",\n        \"code\":
                \"meta_field\",\n        \"type\":
                \"text\",\n        \"values\":
                [],\n        \"visible_on_the_category_page\":
                true,\n        \"required\":
                false\n      }\n    ],\n    \"definition_values\":
                {}\n  },\n  \"seo\": {\n    \"title\": \"Electronics - Shop
                Now\",\n    \"description\": \"Browse our electronics
                collection\",\n    \"keywords\": \"electronics,
                gadgets\"\n  }\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /categories/1:
    get:
      tags:
        - Categories
        - ProductHub
      summary: Get Category
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Categories
        - ProductHub
      summary: Update Category
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"name\": \"Updated Category Name\",\n  \"description\":
                \"Updated description\",\n  \"slug\": \"updated-slug\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Categories
        - ProductHub
      summary: Delete Category
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /categories/update/depths:
    post:
      tags:
        - Categories
        - ProductHub
      summary: Set Depths for All Categories
      description: Recalculate and update depths for all categories
      requestBody:
        content: {}
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /warehouses:
    get:
      tags:
        - Warehouses
        - ProductHub
      summary: List Warehouses
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: "1"
        - name: per_page
          in: query
          schema:
            type: integer
          description: Max 50
          example: "20"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Warehouses
        - ProductHub
      summary: Create Warehouse
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"name\": \"Main Warehouse\",\n  \"location\": \"New York,
                USA\",\n  \"default_warehouse\": true\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /warehouses/1:
    get:
      tags:
        - Warehouses

    get:
      tags:
        - Public (URL-based installation key)
        - OrderHub
      summary: Payment Redirect (browser → DataHub)
      description: Customer is redirected here by the PSP after completing payment.
        The handler finalizes the order based on PSP-side status and redirects
        the browser to the storefront success/cancel page.
      parameters:

        "200":
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/order-hub/carts:
    get:
      tags:
        - Carts
        - OrderHub
      summary: List Carts
      description: Returns carts visible to the caller. For a logged-in customer, this
        is their carts (typically one active). For a guest with `session-uuid`,
        the matching guest cart.
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: include
          in: query
          schema:
            type: string
          example: cartItems.product.price,cartItems.product.mainMedia
        - name: per_page
          in: query
          schema:
            type: integer
          example: "10"
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Carts
        - OrderHub
      summary: Create Cart
      description: Explicitly create a cart. Most storefronts create lazily via `PATCH
        /carts` (upsert).
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\n  \"customer_id\": null,\n  \"session_uuid\":
                \"00000000-0000-0000-0000-000000000000\"\n}"'
      parameters:
        - name: installation-key
          in: header
          schema:
            type: string
          example: "{{installationKey}}"
        - name: x-auth-token
          in: header
          schema:
            type: string
          example: "{{authToken}}"
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
        - Carts
        - OrderHub

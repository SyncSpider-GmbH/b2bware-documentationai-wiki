  /api/v1/apps/rule-hub/cart-price-rules:
    get:
      tags:
        - Cart Price Rules
      summary: List Cart Price Rules
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          example: '25'
        - name: filter[status]
          in: query
          schema:
            type: string
          example: active
        - name: filter[action_type]
          in: query
          schema:
            type: string
          example: by_percent
        - name: sort
          in: query
          schema:
            type: string
          example: priority
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Cart Price Rules
      summary: Create Cart Rule – Per Unit Attribute
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: 5p/Litre Discount – 540L+ Threshold
                description: 5p per litre discount when total litres >= 540
                status: active
                priority: 10
                conditions:
                  type: combine
                  operator: all
                  conditions:
                    - type: cart_items_aggregate
                      source: product_custom_attribute
                      attribute: weight
                      aggregate: sum
                      quantity_aware: true
                      operator: '>='
                      value: 540
                action_type: per_unit_attribute_fixed
                action_amount: 0.05
                action_attribute: weight
                action_attribute_source: product_custom_attribute
                free_shipping: 'no'
                stop_further_rules: false
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/cart-price-rules/1:
    get:
      tags:
        - Cart Price Rules
      summary: Get Cart Price Rule
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
        - Cart Price Rules
      summary: Update Cart Price Rule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Updated Rule Name
                action_amount: 15
                status: active
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Cart Price Rules
      summary: Delete Cart Price Rule
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/cart-validation-rules/statuses/list:
    get:
      tags:

            application/json: {}
  /api/v1/apps/rule-hub/cart-validation-rules:
    get:
      tags:
        - Cart Validation Rules
      summary: List Validation Rules
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          example: '25'
        - name: filter[status]
          in: query
          schema:
            type: string
          example: active
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Cart Validation Rules
      summary: Create Validation Rule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Bulk vs Standard Mutual Exclusion
                description: Cannot mix Bulk and Standard Aspen fuel products
                status: active
                constraint_type: mutual_exclusion
                group_a:
                  type: combine
                  operator: all
                  conditions:
                    - type: attribute
                      target: product
                      attribute: sku
                      operator: contains
                      value: BULK
                group_b:
                  type: combine
                  operator: all
                  conditions:
                    - type: attribute
                      target: product
                      attribute: sku
                      operator: contains
                      value: STD
                error_message: Cannot mix Bulk and Standard fuel products in the same cart
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/cart-validation-rules/1:
    get:

        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/catalog-price-rules:
    get:
      tags:
        - Catalog Price Rules
      summary: List Catalog Price Rules
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          example: '25'
        - name: filter[status]
          in: query
          schema:
            type: string
          example: active
        - name: filter[name]
          in: query
          schema:
            type: string
          example: VIP
        - name: sort
          in: query
          schema:
            type: string
          example: priority
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Catalog Price Rules
      summary: Create Catalog Price Rule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: VIP Customer – 15% off SKU 5875
                description: 15% discount for VIP customers on product SKU 5875
                status: active
                priority: 10
                conditions:
                  type: combine
                  operator: all
                  conditions:
                    - type: attribute
                      target: product
                      attribute: sku
                      operator: '=='
                      value: '5875'
                    - type: attribute
                      target: customer
                      attribute: customer_group_id
                      operator: '=='
                      value: '1'
                action_type: by_percent
                action_amount: 15
                customer_group_ids:
                  - 1
                stop_further_rules: false
                date_from: null
                date_to: null
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/catalog-price-rules/1:
    get:
      tags:
        - Catalog Price Rules
      summary: Get Catalog Price Rule
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
        - Catalog Price Rules
      summary: Update Catalog Price Rule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: VIP – 20% off SKU 5875
                action_amount: 20
                status: active
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Catalog Price Rules
      summary: Delete Catalog Price Rule
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

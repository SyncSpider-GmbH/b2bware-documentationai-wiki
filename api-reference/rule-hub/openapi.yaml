openapi: 3.0.0
info:
  title: RuleHub API
  description: >-
    Complete API collection for RuleHub — Promotion, Pricing & Shipping Rule
    Engine
  version: 1.0.0
servers:
  - url: https://api.datahub.syncspider.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
tags:
  - name: Condition Schema
  - name: Catalog Price Rules
  - name: Cart Price Rules
  - name: Cart Validation Rules
  - name: Coupons
  - name: Rule Usage Logs
  - name: Shipping Rate Rules
  - name: Cart Rule Progress (OrderHub)
paths:
  /api/v1/apps/rule-hub/conditions/schema:
    get:
      tags:
        - Condition Schema
      summary: Get Full Schema
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/apps/rule-hub/conditions/schema/product:

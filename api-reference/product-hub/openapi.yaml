      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /warehouses/1:
    get:
      tags:
        - Warehouses
      summary: Get Warehouse
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Warehouses
      summary: Update Warehouse
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"name\": \"Updated Warehouse Name\",\n  \"location\":

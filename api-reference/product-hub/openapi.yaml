      summary: List Prices
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Prices
      summary: Create Group Price
      description: Special pricing for customer groups
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"product_id\": 1,\n  \"price_type\": \"group\",\n 
                \"price\": 79.99,\n  \"customer_group_id\": 1\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /prices/1:
    get:
      tags:
        - Prices
      summary: Get Price
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Prices
      summary: Update Price
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n  \"price\": 109.99,\n  \"start_date\": \"2024-01-01\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Prices
      summary: Delete Price
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /prices/upsert/bulk:
    post:
      tags:
        - Prices
      summary: Upsert Bulk Prices
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "[\n  {\n    \"product_id\": 1,\n    \"price_type\":
                \"regular\",\n    \"price\": 99.99\n  },\n  {\n   
                \"product_id\": 1,\n    \"price_type\": \"special\",\n   
                \"price\": 79.99,\n    \"start_date\": \"2024-01-01\",\n   
                \"end_date\": \"2024-01-31\"\n  },\n  {\n    \"id\": 5,\n   
                \"price\": 89.99\n  }\n]"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Warehouses
      summary: Delete Warehouse
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /stock:
    get:
      tags:
        - Stock
      summary: List Stock
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Stock
      summary: Create Stock
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"product_id\": 1,\n  \"warehouse_id\": 1,\n 
                \"stock_quantity\": 100,\n  \"stock_availability\": true,\n 
                \"backorders\": \"no_backorders\",\n 
                \"minimum_qty_allowed_in_shopping_cart\": 1,\n 
                \"maximum_qty_allowed_in_shopping_cart\": 10,\n 
                \"qty_for_items_status_to_become_out_of_stock\": 5,\n 
                \"upcoming_qty\": [\n    {\n      \"date\":
                \"2024-12-31\",\n      \"quantity\": 50\n    }\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /stock/1:
    get:
      tags:
        - Stock
      summary: Get Stock
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Stock
      summary: Update Stock
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"stock_quantity\": 75,\n  \"stock_availability\":
                true,\n  \"backorders\": \"allow_qty_below_0\"\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Stock
      summary: Delete Stock
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /stock/upsert/bulk:
    post:
      tags:
        - Stock
      summary: Upsert Bulk Stock
      description: >-
        Create or update multiple stock records. Include id for update, or
        product_id+warehouse_id for create
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "[\n  {\n    \"product_id\": 1,\n    \"warehouse_id\": 1,\n   
                \"stock_quantity\": 150,\n    \"stock_availability\": true,\n   
                \"backorders\": \"no_backorders\"\n  },\n  {\n    \"id\":
                2,\n    \"stock_quantity\": 200,\n    \"stock_availability\":
                true\n  }\n]"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /prices:
    get:
      tags:

          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"product_id\": 1,\n  \"media_type\": \"image\",\n 
                \"media_url\": \"https://example.com/image.jpg\",\n 
                \"alt_text\": \"Product image alt text\",\n  \"is_primary\":
                true\n}"
      parameters:
        - name: Content-Type

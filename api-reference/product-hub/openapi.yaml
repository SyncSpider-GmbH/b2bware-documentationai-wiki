openapi: 3.0.0
info:
  title: ProductHub API
  description: Catalog, prices, stock, media.
  version: 1.0.0
  contact:
    name: B2Bware
    url: https://syncspider.com
servers:
  - url: https://api.datahub.syncspider.com
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
tags:
  - name: Products
  - name: Categories
  - name: Warehouses
  - name: Stock
  - name: Prices
  - name: Media
  - name: Vendors
  - name: Jurisdiction
  - name: Tax Classes
  - name: Translations
  - name: Attributes (ProductHub)
  - name: Attribute Values
  - name: Attribute Groups
  - name: Customer Groups
  - name: Demo Data
paths:
  /products:
    get:
      tags:
        - Products
      summary: List Products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          description: Page number
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          description: Results per page (max 50)
          example: '20'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Products
      summary: Create Product
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"name\": \"Sample Product\",\n  \"sku\":
                \"SKU-12345\",\n  \"product_type\": \"simple\",\n 
                \"description\": \"Product description\",\n 
                \"short_description\": \"Short description\",\n  \"status\":
                \"active\",\n  \"visibility\": \"visible\",\n  \"manage_stock\":
                true,\n  \"tax_class_id\": 1,\n  \"attributes\": [\n    {\n     
                \"attribute_id\": 1,\n      \"value\": \"Red\",\n     
                \"auto_create_value\": false\n    }\n  ],\n  \"prices\": [\n   
                {\n      \"price_type\": \"regular\",\n      \"price\":
                99.99\n    }\n  ],\n  \"stock\": [\n    {\n     
                \"warehouse_id\": 1,\n      \"stock_quantity\": 100,\n     
                \"stock_availability\": true,\n      \"backorders\":
                \"no_backorders\"\n    }\n  ],\n  \"media\": [\n    {\n     
                \"file\": \"base64_encoded_file_or_url\",\n      \"media_type\":
                \"image\",\n      \"alt_text\": \"Product image\",\n     
                \"is_primary\": true,\n      \"order\": 1\n    }\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/1:
    get:
      tags:
        - Products
      summary: Get Product
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Products
      summary: Update Product
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"name\": \"Updated Product Name\",\n  \"description\":
                \"Updated description\",\n  \"status\": \"active\",\n 
                \"prices\": [\n    {\n      \"price_type\": \"regular\",\n     
                \"price\": 149.99\n    }\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Products
      summary: Delete Product
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/upsert/single:
    put:
      tags:
        - Products
      summary: Upsert Product
      description: >-
        Create or update product by SKU. action can be: createOrUpdate,
        onlyCreate, onlyUpdate
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"sku\": \"SKU-12345\",\n  \"name\": \"Product Name\",\n 
                \"product_type\": \"simple\",\n  \"description\": \"Product
                description\",\n  \"short_description\": \"Short
                description\",\n  \"status\": \"active\",\n  \"visibility\":
                \"visible\",\n  \"manage_stock\": true,\n  \"action\":
                \"createOrUpdate\",\n  \"attributes\": [\n    {\n     
                \"attribute_id\": 1,\n      \"value\": \"Blue\"\n    }\n  ],\n 
                \"prices\": [\n    {\n      \"price_type\": \"regular\",\n     
                \"price\": 199.99\n    }\n  ],\n  \"stock\": [\n    {\n     
                \"warehouse_id\": 1,\n      \"stock_quantity\": 50,\n     
                \"stock_availability\": true\n    }\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/bulk/update:
    put:
      tags:
        - Products
      summary: Bulk Update Products
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "[\n  {\n    \"id\": 1,\n    \"name\": \"Updated Product
                1\",\n    \"status\": \"active\"\n  },\n  {\n    \"id\": 2,\n   
                \"name\": \"Updated Product 2\",\n    \"status\":
                \"inactive\"\n  }\n]"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/bulk/delete:
    delete:
      tags:
        - Products
      summary: Bulk Delete Products
      description: >-
        Delete multiple products by IDs or use delete_all: true to delete all
        products
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/1/createVariations:
    put:
      tags:
        - Products
      summary: Create Variations
      description: Create product variations based on attribute combinations
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"attributes\": [\n    {\n      \"attribute_id\":
                1,\n      \"value\": [\"Red\", \"Blue\", \"Green\"]\n    },\n   
                {\n      \"attribute_id\": 2,\n      \"value\": [\"S\", \"M\",
                \"L\"]\n    }\n  ]\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/1/attachVariationsAttributes:
    put:
      tags:
        - Products
      summary: Attach Variations Attributes
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n  \"attribute_ids\": [1, 2, 3]\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/1/child-products:
    delete:
      tags:
        - Products
      summary: Detach Child Products
      description: Unlink child products from parent product
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /products/1/generateAIDescription:
    put:
      tags:
        - Products
      summary: Generate AI Description
      description: Generate product description using AI from PDF attributes
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n  \"language\": \"en_001\"\n}"'
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /categories:
    get:
      tags:
        - Categories
      summary: List Categories
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: per_page
          in: query
          schema:
            type: integer
          description: Max 200
          example: '50'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Categories
      summary: Create Category
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"name\": \"Electronics\",\n  \"slug\":
                \"electronics\",\n  \"description\": \"Electronic products
                category\",\n  \"parent_id\": null,\n 
                \"exclude_from_main_menu\": false,\n 
                \"exclude_from_layer_navigation\": false,\n  \"media\": [\n   
                {\n      \"file\": \"base64_or_url\",\n      \"media_type\":
                \"image\",\n      \"alt_text\": \"Category image\",\n     
                \"is_primary\": true,\n      \"order\": 1\n    }\n  ],\n 
                \"attributes\": [\n    {\n      \"attribute_id\": 1,\n     
                \"value\": \"Category Value\",\n      \"auto_create_value\":
                false\n    }\n  ],\n  \"meta_data\": {\n    \"definition\":
                [\n      {\n        \"name\": \"Meta Field\",\n        \"code\":
                \"meta_field\",\n        \"type\": \"text\",\n       
                \"values\": [],\n        \"visible_on_the_category_page\":
                true,\n        \"required\": false\n      }\n    ],\n   
                \"definition_values\": {}\n  },\n  \"seo\": {\n    \"title\":
                \"Electronics - Shop Now\",\n    \"description\": \"Browse our
                electronics collection\",\n    \"keywords\": \"electronics,
                gadgets\"\n  }\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /categories/1:
    get:
      tags:
        - Categories
      summary: Get Category
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - Categories
      summary: Update Category
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"name\": \"Updated Category Name\",\n  \"description\":
                \"Updated description\",\n  \"slug\": \"updated-slug\"\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Categories
      summary: Delete Category
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /categories/update/depths:
    post:
      tags:
        - Categories
      summary: Set Depths for All Categories
      description: Recalculate and update depths for all categories
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

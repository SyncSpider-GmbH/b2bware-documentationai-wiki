name: Release Skills

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version
        id: ver
        run: echo "VERSION=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Build public skills
        run: python3 scripts/build-public-skills.py --version ${{ steps.ver.outputs.VERSION }}

      - name: Normalize zip filenames (drop version suffix)
        run: |
          set -euo pipefail
          cd dist/skills
          for skill in datahub-core datahub-hubs datahub-storefront; do
            mv "${skill}-${{ steps.ver.outputs.VERSION }}.zip" "${skill}.zip"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: skills-v${{ steps.ver.outputs.VERSION }}
          name: Skills v${{ steps.ver.outputs.VERSION }}
          make_latest: "true"
          files: |
            dist/skills/datahub-core.zip
            dist/skills/datahub-hubs.zip
            dist/skills/datahub-storefront.zip
